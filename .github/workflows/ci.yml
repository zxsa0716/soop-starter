name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend · lint + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check src/
      - name: Smoke tests (schemas + ontology + fixtures)
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: sk-ant-test
          POSTGRES_HOST: localhost
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          REDIS_HOST: localhost
        run: pytest -q

  frontend:
    name: Frontend · type check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: frontend/package.json }
      - name: Install
        working-directory: frontend
        run: npm install --legacy-peer-deps
      - name: Type check
        working-directory: frontend
        run: npm run typecheck
      - name: Build
        working-directory: frontend
        run: npm run build

  docs-validate:
    name: Docs · ontology + persona fixture schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install validators
        run: pip install PyYAML jsonschema pydantic==2.7.4
      - name: Validate ForKG-Korea ontology
        run: python -c "import yaml,sys; d=yaml.safe_load(open('data/ontology/forkg_korea_ontology.yaml')); assert len(d['entities'])>=9 and len(d['relations'])>=11; print('ontology OK')"
      - name: Validate persona fixtures
        run: |
          for f in data/fixtures/persona_p0*.json; do
            python -c "import json,sys; d=json.load(open('$f')); assert 'persona_id' in d and 'module_results' in d, 'invalid $f'"
          done
          echo "all persona fixtures OK"
